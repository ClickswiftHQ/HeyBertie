title: Guide
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: Title
          -
            handle: content
            field:
              type: bard
              display: Content
              save_html: true
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - removeformat
                - quote
                - anchor
                - image
                - horizontalrule
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
              character_limit: 300
          -
            handle: featured_image
            field:
              type: assets
              display: 'Featured Image'
              container: assets
              max_files: 1
              mode: list
          -
            handle: featured
            field:
              type: toggle
              display: Featured
              default: false
  taxonomies:
    display: Taxonomies
    sections:
      -
        fields:
          -
            handle: categories
            field:
              type: terms
              display: Categories
              taxonomies:
                - categories
              mode: select
          -
            handle: tags
            field:
              type: terms
              display: Tags
              taxonomies:
                - tags
              mode: select
  seo:
    display: SEO
    sections:
      -
        fields:
          -
            handle: seo_title
            field:
              type: text
              display: 'SEO Title'
          -
            handle: seo_description
            field:
              type: textarea
              display: 'SEO Description'
              character_limit: 160
          -
            handle: og_image
            field:
              type: assets
              display: 'OG Image'
              container: assets
              max_files: 1
              mode: list
